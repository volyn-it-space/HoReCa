<main class="mx-auto max-w-[var(--container)] px-3 pb-8 pt-3 sm:px-4 sm:pb-10">
	<section
		class="rounded-[1.2rem] border border-dashed border-[var(--c-border)] bg-[var(--c-bg-secondary)] px-4 py-10 text-center sm:px-6 sm:py-14"
	>
		<div
			class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-full border border-[var(--c-border)] bg-[var(--c-bg-primary)] text-[var(--c-secondary)]"
		>
			<span class="material-symbols-outlined text-[28px]" aria-hidden="true">article</span>
		</div>

		<p
			class="mt-4 text-[12px] font-semibold uppercase tracking-[0.18em] text-[var(--c-secondary)]"
			translate
		>
			Articles
		</p>
		<h1 class="mt-2 text-xl font-semibold text-[var(--c-text-secondary)]" translate>
			No articles yet
		</h1>
		<p
			class="mx-auto mt-2 max-w-[28rem] text-sm leading-6 text-[var(--c-text-muted)]"
			translate
		>
			New posts are on the way
		</p>
	</section>
</main>
